# ==============================================================================
# 🚀 高可用 PostgreSQL 集群部署蓝图 (支持 IPv4/IPv6 双栈与自适应网络调优)
# ==============================================================================
# 💡 架构演进说明：
# 本文件已实现“配置与环境分离”。请勿直接硬编码或修改本文件中的 ${VAR} 占位符。
# 所有的变量（如 IP、密码、节点 ID、动态超时参数）均应通过项目根目录下的 `.env` 文件注入。
# 强烈推荐使用项目配套的 install.sh 脚本来自动探测物理网络延迟，生成 `.env` 并拉起本编排。
# ==============================================================================

# 🛡️ 磁盘免疫策略：定义全局标准的容器日志轮转规则 (YAML 锚点)
# 解决痛点：彻底根治 HAProxy 高频健康检查 (TCP Reset) 导致的 Patroni 连接重置报错狂刷，
# 防止无意义的底层 Python 异常日志在数天内撑爆小容量 VPS 磁盘。
# 策略边界：每个容器最多保留 3 个历史文件，单文件上限 50MB (即单容器总日志封顶 150MB)。
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  etcd:
    # 💡 核心修改：使用官方多架构镜像，通吃 ARM64 / AMD64 架构的主机
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    # 💡 破解受限 LXC 主机的内核配额限制 (Session Keyring Bypass)
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    restart: always
    network_mode: "host"
    # 🛡️ 挂载全局日志护盾
    logging: *default-logging
    # 💡 变量注入源：指定从本地环境文件读取变量
    env_file: 
      - .env
    environment:
      - ETCD_NAME=etcd${NODE_ID}
      - ETCD_DATA_DIR=/etcd-data
      # 💡 网络层：精准绑定当前节点的 IPv4 或 IPv6 地址，支持双栈通讯
      - ETCD_LISTEN_PEER_URLS=http://${CURRENT_IP}:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://${CURRENT_IP}:2380
      - ETCD_LISTEN_CLIENT_URLS=http://${CURRENT_IP}:2379,http://127.0.0.1:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://${CURRENT_IP}:2379
      # 💡 集群拓扑：自动解析外部传入的三节点 IP，完成组网握手
      - ETCD_INITIAL_CLUSTER_TOKEN=pg-ha-cluster
      - ETCD_INITIAL_CLUSTER=etcd1=http://${NODE1_IP}:2380,etcd2=http://${NODE2_IP}:2380,etcd3=http://${NODE3_IP}:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      # 💡 性能与延迟自适应调优：
      # 心跳间隔固定 1000ms；选举超时由 install.sh 探测出的网络环境动态决定。
      # 使用 ${VAR:-5000} 语法提供绝对的安全兜底（万一变量缺失，默认退回 5000ms）。
      - ETCD_HEARTBEAT_INTERVAL=1000
      - ETCD_ELECTION_TIMEOUT=${ETCD_ELECTION_TIMEOUT:-5000}
    volumes:
      - ./etcd-data:/etcd-data

  patroni:
    build: 
      context: ./patroni
      # 💡 解决纯 IPv6 主机下 build 阶段 apt-get 无法联网的问题
      network: host
    container_name: patroni
    # 💡 破解受限 LXC 主机的内核配额限制
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    restart: always
    network_mode: "host"
    privileged: true
    # 🛡️ 挂载全局日志护盾
    logging: *default-logging
    # 💡 变量注入源：同样接入 .env，确保环境一致性
    env_file: 
      - .env
    environment:
      - PATRONI_NAME=node${NODE_ID}
      # 💡 核心升级：使用 * 替代 0.0.0.0，完美支持宿主机的双栈 (IPv4+IPv6) 监听
      - PATRONI_RESTAPI_LISTEN=*:8008
      - PATRONI_RESTAPI_CONNECT_ADDRESS=${CURRENT_IP}:8008
      - PATRONI_POSTGRESQL_LISTEN=*:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=${CURRENT_IP}:5432
      
      # 💡 跨国高延迟网络自适应调优：动态注入 Leader 租约与重试超时，防止网络抖动导致的脑裂与误切。
      - PATRONI_TTL=${PATRONI_TTL:-30}
      - PATRONI_LOOP_WAIT=${PATRONI_LOOP_WAIT:-10}
      - PATRONI_RETRY_TIMEOUT=${PATRONI_RETRY_TIMEOUT:-10}
      
      # 💡 终极修复：
      # 1. 变量名必须带 PATRONI_ETCD3_ 前缀，Patroni 才会识别。
      # 2. 必须加单引号 ('...')，防止纯 IPv6 地址的 [ ] 括号被 Python 底层当做 YAML 数组解析导致启动崩溃。
      - PATRONI_ETCD3_HOSTS='${NODE1_IP}:2379,${NODE2_IP}:2379,${NODE3_IP}:2379'
      
      # 💡 安全演进：将 .env 中生成的强密码安全透传给 Patroni，实现密码与代码仓库的彻底解耦
      - PATRONI_SUPERUSER_PASSWORD=${PG_ROOT_PASSWORD}
      - PATRONI_REPLICATION_PASSWORD=${PG_REPL_PASSWORD}
    volumes:
      - ./pg-data:/var/lib/postgresql/data
      # 注意：patroni.yml 的映射已在 Dockerfile 中打包处理，如果需要外部挂载覆盖，可在此处取消注释
      # - ./patroni/patroni.yml:/etc/patroni.yml
    depends_on:
      - etcd

  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy
    # 💡 破解受限 LXC 主机的内核配额限制
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    # 💡 强制降权至 ping/haproxy 用户组，绕过部分 LXC 极品主机对 root 用户最大文件描述符 (FD) 的变态限制
    user: "99:99"
    restart: always
    network_mode: "host"
    # 🛡️ 挂载全局日志护盾
    logging: *default-logging
    # 💡 变量注入源：让 HAProxy 容器环境也拥有集群的 IP 视图和动态参数
    env_file: 
      - .env
    environment:
      # 将三个节点的 IP 传递进去，供 HAProxy 内部的 lua 或环境解析
      - NODE1_IP=${NODE1_IP}
      - NODE2_IP=${NODE2_IP}
      - NODE3_IP=${NODE3_IP}
      # 💡 将动态计算的健康检查间隔时间传入容器，供 haproxy.cfg 读取
      - HA_INTER_TIME=${HA_INTER_TIME:-2000}
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - patroni