scope: pg-ha-cluster
namespace: /db/
name: node<NODE_ID>

restapi:
  # 💡 核心修复：改回 0.0.0.0，彻底解决 Python http.server 双重绑定导致的 [Errno 98] 报错
  listen: 0.0.0.0:8008
  connect_address: <CURRENT_IP>:8008

etcd3:
  hosts: <NODE1_IP>:2379,<NODE2_IP>:2379,<NODE3_IP>:2379
  protocol: http

bootstrap:
  dcs:
    # 针对 200ms 高延迟的集群超时时间调优
    ttl: 60
    loop_wait: 10
    retry_timeout: 20
    maximum_lag_on_failover: 33554432
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_connections: 100
        max_wal_senders: 10
        max_replication_slots: 10
        wal_keep_size: 1024MB
  initdb:
    - encoding: UTF8
    - data-checksums

postgresql:
  # 💡 核心修复：与 API 保持一致，使用 0.0.0.0 确保 Patroni 启动守护进程时不抛出异常
  listen: 0.0.0.0:5432
  connect_address: <CURRENT_IP>:5432
  data_dir: /var/lib/postgresql/data/patroni
  bin_dir: /usr/lib/postgresql/16/bin
  pgpass: /tmp/pgpass
  authentication:
    replication:
      username: replicator
      password: replpassword
    superuser:
      username: postgres
      password: pgpassword
  pg_hba:
    # 💡 保留：底层依然同时为 IPv4 和 IPv6 开放复制与业务的白名单权限
    - host replication replicator 0.0.0.0/0 md5
    - host replication replicator ::/0 md5
    - host all all 0.0.0.0/0 md5
    - host all all ::/0 md5