# ==============================================================================
# 全局配置 (Global Settings)
# ==============================================================================
global
    maxconn 1000
    # 💡 增加处理线程，应对跨海高延迟带来的连接积压
    nbthread 4

# ==============================================================================
# 默认参数 (Default Settings)
# ==============================================================================
defaults
    mode tcp
    # 💡 数据库长连接建议保持较长超时，避免应用侧出现莫名断连
    timeout client 30m
    timeout server 30m
    timeout connect 5s
    # 💡 针对 145ms 延迟，增加检查超时，防止因网络抖动误判节点宕机
    timeout check 5s

# ==============================================================================
# 写库入口 - 端口 5000 (Write Traffic)
# ==============================================================================
frontend pg_write_front
    bind *:5000
    default_backend pg_write_back

backend pg_write_back
    # 💡 使用 /primary 接口探测，确保流量始终只流向唯一的 Leader 节点
    option httpchk GET /primary
    http-check expect status 200
    # 💡 inter 4s: 每4秒检查一次；fall 3: 连续3次失败才下线；on-marked-down: 宕机时立即切断活动连接
    default-server inter 4s fall 3 rise 2 on-marked-down shutdown-sessions
    
    server node1 <NODE1_IP>:5432 maxconn 100 check port 8008
    server node2 <NODE2_IP>:5432 maxconn 100 check port 8008
    server node3 <NODE3_IP>:5432 maxconn 100 check port 8008

# ==============================================================================
# 读库入口 - 端口 5001 (Read Traffic - HA/Failover)
# ==============================================================================
frontend pg_read_front
    bind *:5001
    default_backend pg_read_back

backend pg_read_back
    balance roundrobin
    # 💡 这里是解决你“全红”问题的关键
    # 默认只探测 /replica（从库），确保读写分离，降低主库压力
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 4s fall 3 rise 2 on-marked-down shutdown-sessions

    # --- 活跃节点 (Active Replicas) ---
    # 只要集群里还有从库活着，流量就会在这些节点间轮询
    server node1 <NODE1_IP>:5432 maxconn 100 check port 8008
    server node2 <NODE2_IP>:5432 maxconn 100 check port 8008
    server node3 <NODE3_IP>:5432 maxconn 100 check port 8008

    # --- 💡 灾难备份节点 (Backup/Fallback) ---
    # 关键点：使用 'backup' 关键字和 '/primary' 探测路径
    # 只有当上面的从库全挂了，HAProxy 才会启用这些备份项，将读流量导向唯一的 Leader (主库)
    server node1_master_bk <NODE1_IP>:5432 maxconn 100 check port 8008/primary backup
    server node2_master_bk <NODE2_IP>:5432 maxconn 100 check port 8008/primary backup
    server node3_master_bk <NODE3_IP>:5432 maxconn 100 check port 8008/primary backup

# ==============================================================================
# 状态监控面板 - 端口 8404 (Monitoring)
# ==============================================================================
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    # 💡 强迫症提示：内网虽安全，加个简单账号更专业（选配）
    # stats auth admin:pgpassword