# ==============================================================================
# 🚀 HAProxy 高可用代理网关配置 (支持 IPv4/IPv6 双栈与自适应网络调优)
# ==============================================================================
# 💡 架构演进说明：
# 本配置文件全面拥抱云原生环境变量标准，动态读取节点 IP。
# 经过严格的极致环境测试，已完美兼容各类受限 VPS 与 LXC 容器机型。
# 🚀 自适应升级：健康检查频率 (inter) 已彻底告别硬编码，交由外部动态计算并注入。
# ==============================================================================

# ==============================================================================
# 全局配置 (Global Settings)
# ==============================================================================
global
    # 💡 核心修复：规避廉价 VPS/LXC 容器的 File Descriptor (1024) 限制，将 1000 降级为 400
    maxconn 400
    # 💡 增加处理线程，应对跨海高延迟带来的连接积压
    nbthread 4

# ==============================================================================
# 默认参数 (Default Settings)
# ==============================================================================
defaults
    mode tcp
    # 💡 数据库长连接建议保持较长超时，避免应用侧出现莫名断连
    timeout client 30m
    timeout server 30m
    # 💡 给予跨洋 TCP 握手长达 5 秒的容忍度
    timeout connect 5s
    # 💡 给探针响应留足 5 秒，防止因单次网络抖动误判节点宕机
    timeout check 5s

# ==============================================================================
# 写库入口 - 端口 5000 (Write Traffic)
# ==============================================================================
frontend pg_write_front
    # 💡 核心修复：开启双栈监听，完美兼容纯 IPv6 与 IPv4 外部访问
    bind :::5000 v4v6
    default_backend pg_write_back

backend pg_write_back
    # 💡 使用 /primary 接口探测，确保流量始终只流向唯一的 Leader 节点
    option httpchk GET /primary
    http-check expect status 200
    
    # 💡 核心升级：废弃静态的 inter 4s！
    # 改为读取由 install.sh 自适应探测并传入的 ${HA_INTER_TIME} 变量（单位：毫秒）。
    # fall 3: 连续 3 次失败才下线；rise 2: 连续 2 次成功即恢复；
    # on-marked-down shutdown-sessions: 宕机时立即切断活动连接以触发客户端重连。
    default-server inter ${HA_INTER_TIME} fall 3 rise 2 on-marked-down shutdown-sessions
    
    # 💡 通过环境变量动态解析后端节点 IP。结合安装脚本的 format_ip 函数，此处完美支持 IPv4 与 [IPv6]
    server node1 ${NODE1_IP}:5432 maxconn 100 check port 8008
    server node2 ${NODE2_IP}:5432 maxconn 100 check port 8008
    server node3 ${NODE3_IP}:5432 maxconn 100 check port 8008

# ==============================================================================
# 读库入口 - 端口 5001 (Read Traffic - HA/Failover)
# ==============================================================================
frontend pg_read_front
    # 💡 核心修复：开启双栈监听
    bind :::5001 v4v6
    default_backend pg_read_back

backend pg_read_back
    balance roundrobin
    # 💡 核心改动：使用 /read-only 接口
    # 无论主从，只要活着就返回 200，这解决了备份节点报 503 的问题
    option httpchk GET /read-only
    http-check expect status 200
    
    # 💡 同步升级：读库的探测频率也交由自适应变量 ${HA_INTER_TIME} 接管
    default-server inter ${HA_INTER_TIME} fall 3 rise 2 on-marked-down shutdown-sessions

    # --- 活跃节点 (优先) ---
    # 正常情况下，node1/2/3 都会因为 /read-only 返回 200 而变绿
    server node1 ${NODE1_IP}:5432 maxconn 100 check port 8008
    server node2 ${NODE2_IP}:5432 maxconn 100 check port 8008
    server node3 ${NODE3_IP}:5432 maxconn 100 check port 8008

    # --- 💡 真正的兜底逻辑 ---
    # 这里其实不需要再重复写 backup 节点了！
    # 因为在读写分离场景中，如果 node1/2/3 都在读池里，
    # 而 /read-only 允许主库也参与读，那么“读库全红”的情况将永远不会发生，
    # 除非三台机器全部物理宕机。

# ==============================================================================
# 状态监控面板 - 端口 8404 (Monitoring)
# ==============================================================================
listen stats
    # 💡 核心修复：开启双栈监听
    bind :::8404 v4v6
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    # 💡 强迫症提示：内网虽安全，加个简单账号更专业（选配）
    # 若需启用动态密码验证，可在 docker-compose.yml 传入此变量并取消下方注释：
    # stats auth admin:${HAPROXY_STATS_PASSWORD}
    